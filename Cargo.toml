[package]
name = "clauhist"
version = "0.1.0"
edition = "2021"
description = "Browse and resume Claude Code chat sessions"
license = "MIT"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
clap = { version = "4", features = ["derive"] }
libc = "0.2"
